<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Sekce Příklady</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Příklady sekcí (Section)</h1>
    
    <section class="sekce-modra">
        <h2>Sekce 1 - Modrá</h2>
        <p>Toto je první sekce s modrou barvou pozadí a bílým textem.</p>
    </section>
    <section class="sekce-cervena">
        <h2>Sekce 2 - Červená</h2>
        <p>Toto je druhá sekce s červenou barvou pozadí a bílým textem.</p>
    </section>
    
    <section class="sekce-zelena">
        <h2>Sekce 2 - Zelená</h2>
        <p>Toto je treti sekce se zeleným pozadím a tmavým textem.</p>
    </section>
    

</body>
</html>
